[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bayesian-tool-benchmark"
version = "0.1.0"
description = "Bayesian decision-theoretic tool agent vs LangChain ReAct benchmark"
license = "AGPL-3.0-only"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.24",
    "scipy>=1.11",
    "matplotlib>=3.7",
    "seaborn>=0.12",
    "langchain>=0.2",
    "langchain-openai>=0.1",
    "langchain-anthropic>=0.1",
    "pytest>=7.4",
    "langchain-ollama>=1.0.1",
]

[project.optional-dependencies]
dev = [
    "pytest-cov",
    "ruff",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
